[binaries]
c       = '/opt/x-tools7h/arm-unknown-linux-gnueabihf/bin/arm-unknown-linux-gnueabihf-gcc'
cpp     = '/opt/x-tools7h/arm-unknown-linux-gnueabihf/bin/arm-unknown-linux-gnueabihf-g++'
ar      = '/opt/x-tools7h/arm-unknown-linux-gnueabihf/bin/arm-unknown-linux-gnueabihf-ar'
strip   = '/opt/x-tools7h/arm-unknown-linux-gnueabihf/bin/arm-unknown-linux-gnueabihf-strip'
pkgconfig = 'pkg-config'

[built-in options]
c_args        = ['--sysroot=/home/me/rpi-sysroot']
cpp_args      = ['--sysroot=/home/me/rpi-sysroot']
c_link_args   = ['--sysroot=/home/me/rpi-sysroot']
cpp_link_args = ['--sysroot=/home/me/rpi-sysroot']

[properties]
sys_root = '/home/me/rpi-sysroot'

[host_machine]
system     = 'linux'
cpu_family = 'arm'
cpu        = 'cortex-a53'
endian     = 'little'